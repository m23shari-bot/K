<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سلة المشتريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* رأس الصفحة */
        .header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
        }
        .header h1 { font-size: 18px; margin: 0; flex-grow: 1; text-align: center; }
        .back-btn { font-size: 20px; color: #000; text-decoration: none; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* منطقة المنتج - تعديل التوزيع */
        .cart-item {
            display: flex;
            flex-direction: row-reverse; /* لجعل الصورة على اليسار والكلام على اليمين */
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            align-items: flex-start;
        }

        .product-info {
            flex: 1;
            text-align: right;
            padding-left: 10px;
        }

        .product-img-box {
            width: 100px;
            height: 100px;
            background: #f8f8f8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
        }

        .product-img-box img { max-width: 100%; border-radius: 12px; }

        .product-title { font-weight: 700; font-size: 15px; margin-bottom: 5px; display: block; }
        .product-price { font-weight: 700; font-size: 16px; margin-bottom: 15px; }

        /* أزرار الكمية */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .qty-box {
            display: flex;
            align-items: center;
            border: 1px solid #e0e0e0;
            border-radius: 50px;
            padding: 3px 15px;
        }
        .qty-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 10px; }
        .qty-num { font-weight: bold; padding: 0 10px; }

        .remove-link { color: #d32f2f; font-size: 13px; text-decoration: none; font-weight: 600; }

        /* الكوبون */
        .coupon-area {
            display: flex;
            margin: 20px 0;
            gap: 10px;
        }
        .coupon-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            text-align: right;
            background: #fdfdfd;
        }
        .apply-btn {
            background: #eeeeee;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* الملخص */
        .summary-card {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .total-item {
            border-top: 1px dashed #ccc;
            padding-top: 15px;
            margin-top: 15px;
            font-weight: 700;
            font-size: 18px;
        }

        /* زر الدفع السفلي */
        .footer-btn-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        .main-btn {
            background: #000;
            color: #fff;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 18px 25px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h1>سلة المشتريات</h1>
    </div>

    <div class="container">
        <div class="cart-item">
            <div class="product-img-box">
               <span style="color:#ccc">Product</span>
            </div>
            <div class="product-info">
                <span class="product-title">اسم المنتج كما يظهر في المتجر</span>
                <div class="product-price">180 ر.س</div>
                
                <div class="controls-row">
                    <div class="qty-box">
                        <button class="qty-btn">+</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn">-</button>
                    </div>
                    <a href="#" class="remove-link">حذف المنتج</a>
                </div>
            </div>
        </div>

        <div class="coupon-area">
            <input type="text" class="coupon-input" placeholder="هل لديك كود خصم؟">
            <button class="apply-btn">تطبيق</button>
        </div>

        <div class="summary-card">
            <div class="summary-item">
                <span>مجموع المنتجات</span>
                <span>180 ر.س</span>
            </div>
            <div class="summary-item">
                <span>الشحن</span>
                <span style="color: #2e7d32; font-weight: 600;">مجاني</span>
            </div>
            <div class="summary-item total-item">
                <span>الإجمالي النهائي</span>
                <span>180 ر.س</span>
            </div>
        </div>

        <div style="height: 100px;"></div>
    </div>

    <div class="footer-btn-container">
        <button class="main-btn">
            <span>إتمام الطلب</span>
            <span>180 ر.س</span>
        </button>
    </div>

</body>
</html>
