<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | متجر لولا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* الألوان الدقيقة لمتجر لولا (سلة) */
            --salla-primary: #8a3c8e; /* اللون البنفسجي لأزرار الكمية */
            --salla-secondary: #c265a0; /* اللون الوردي لزر إتمام الطلب وأيقونة الحذف */
            --bg-body: #f8f8f8;
            --border-color: #eee;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* حاوية السلة بالكامل */
        .cart-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            padding-bottom: 120px; /* لمساحة الزر العائم */
        }

        /* شريط العنوان العلوي (طبق الأصل) */
        .cart-header {
            display: flex;
            align-items: center;
            justify-content: center; /* توسيط النص */
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: relative;
        }
        .cart-header h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 700;
        }
        .back-icon {
            position: absolute;
            right: 20px; /* أيقونة العودة على اليمين */
            font-size: 20px;
            color: #000;
        }

        .container { padding: 15px; }

        /* منطقة المنتج - تعديل دقيق للمظهر */
        .cart-item {
            display: flex;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
            position: relative;
        }

        .product-img-box {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            margin-right: 15px;
        }
        .product-img-box span { color: #ccc; font-size: 14px; }

        .product-info {
            flex: 1;
            text-align: right;
            padding-left: 10px;
        }
        .product-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
            display: block;
        }
        .product-price { font-weight: 700; font-size: 16px; margin-bottom: 10px; }

        /* أيقونة الحذف الدائرية الوردية (التي طلبتها في الصورة الأولى) */
        .remove-icon {
            color: var(--salla-secondary);
            font-size: 18px;
            border: 1px solid #ffccd5; /* حدود وردية فاتحة */
            border-radius: 50%;
            padding: 10px;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            transition: 0.3s;
        }
        .remove-icon:hover { background: #fff1f3; }

        /* عداد الكمية البنفسجي (مطابق للصورة) */
        .qty-controls {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background: #fff;
            overflow: hidden;
            width: fit-content;
        }
        .qty-btn {
            background: none;
            border: none;
            font-size: 18px;
            padding: 8px 15px;
            cursor: pointer;
            color: var(--salla-primary); /* اللون البنفسجي */
            font-weight: bold;
        }
        .qty-num {
            font-weight: 700;
            padding: 0 10px;
            font-size: 14px;
        }

        /* ملخص الحساب العائم (التوزيع المطابق لمتجر لولا الحقيقي) */
        .cart-summary {
            background: #fff;
            border-top: 1px solid var(--border-color);
            padding: 20px;
            margin-top: 20px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .final-total {
            border-top: 1px dashed #ccc;
            padding-top: 15px;
            margin-top: 15px;
            font-weight: 700;
            font-size: 18px;
        }

        /* زر إتمام الطلب الوردي العائم */
        .checkout-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
        }
        .btn-checkout {
            background: var(--salla-secondary); /* اللون الوردي */
            color: #fff;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <div class="cart-header">
            <a href="#" class="back-icon"><i class="fas fa-arrow-right"></i></a>
            <h1>سلة المشتريات</h1>
        </div>

        <div class="container">
            <div class="cart-item">
                <div class="remove-icon"><i class="fas fa-trash-alt"></i></div>
                <div class="product-img-box">
                    <span>Product</span>
                </div>
                <div class="product-info">
                    <span class="product-title">اسم المنتج كما يظهر في المتجر</span>
                    <div class="product-price">180 ر.س</div>
                    
                    <div class="qty-controls">
                        <button class="qty-btn">+</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn">-</button>
                    </div>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-item">
                    <span>مجموع المنتجات (1)</span>
                    <span>180 ر.س</span>
                </div>
                <div class="summary-item">
                    <span>الشحن</span>
                    <span style="color: #2e7d32; font-weight: 600;">مجاني</span>
                </div>
                <div class="summary-item final-total">
                    <span>الإجمالي</span>
                    <span>180 ر.س</span>
                </div>
            </div>

        </div>
    </div>

    <div class="checkout-bar">
        <button class="btn-checkout">
            <span>إتمام الطلب</span>
            <span>180 ر.س</span>
        </button>
    </div>

</body>
</html>
